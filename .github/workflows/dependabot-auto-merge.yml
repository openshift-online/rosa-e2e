name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  checks: read
  actions: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && github.repository == 'openshift-online/rosa-e2e'
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch Dependabot Metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Wait for E2E Smoke Checks
        id: wait-e2e
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
          steps.metadata.outputs.update-type == 'version-update:semver-digest'
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          MAX_WAIT=7200  # 2 hours
          POLL_INTERVAL=60
          elapsed=0

          echo "Waiting for e2e smoke checks before enabling auto-merge..."

          while [[ $elapsed -lt $MAX_WAIT ]]; do
            smoke_checks=$(gh api "repos/${{ github.repository }}/commits/${SHA}/status" \
              --jq '.statuses[] | select(.context | test("e2e.*smoke")) | "\(.context)|\(.state)"')

            if [[ -z "$smoke_checks" ]]; then
              echo "No e2e smoke checks found yet (${elapsed}s elapsed), waiting..."
              sleep $POLL_INTERVAL
              elapsed=$((elapsed + POLL_INTERVAL))
              continue
            fi

            echo "Current e2e smoke check status:"
            echo "$smoke_checks" | while IFS='|' read -r name state; do
              echo "  $name: $state"
            done

            all_complete=true
            any_failed=false
            while IFS='|' read -r name state; do
              if [[ "$state" == "pending" ]]; then
                all_complete=false
              elif [[ "$state" != "success" ]]; then
                any_failed=true
              fi
            done <<< "$smoke_checks"

            if [[ "$all_complete" == "true" ]]; then
              if [[ "$any_failed" == "false" ]]; then
                echo "All e2e smoke checks passed."
                echo "e2e-result=passed" >> $GITHUB_OUTPUT
                exit 0
              fi

              echo "E2E smoke checks failed. Disabling auto-merge."
              gh pr merge "$PR_NUMBER" --disable-auto 2>/dev/null || true
              gh pr comment "$PR_NUMBER" --body "**E2E Smoke Tests Failed**

          Auto-merge has been disabled because e2e smoke tests failed. Please investigate and /retest when ready."
              echo "e2e-result=failed" >> $GITHUB_OUTPUT
              exit 0
            fi

            sleep $POLL_INTERVAL
            elapsed=$((elapsed + POLL_INTERVAL))
          done

          echo "Timed out waiting for e2e smoke checks after ${MAX_WAIT}s."
          echo "Enabling auto-merge anyway (smoke checks did not complete in time)."
          echo "e2e-result=timeout" >> $GITHUB_OUTPUT

      - name: Enable Auto-Merge for Safe Updates
        if: |
          steps.wait-e2e.outputs.e2e-result != 'failed' && (
            steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
            steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
            steps.metadata.outputs.update-type == 'version-update:semver-digest'
          )
        run: |
          echo "Enabling auto-merge for ${{ steps.metadata.outputs.update-type }} update"
          echo "Dependency: ${{ steps.metadata.outputs.dependency-names }}"

          if gh pr merge "$PR_NUMBER" --auto --squash; then
            echo "Auto-merge enabled successfully"
          else
            echo "::warning::Could not enable auto-merge. Manual review required."
            gh pr comment "$PR_NUMBER" --body "**Dependabot Auto-Merge Status**

          This PR meets the criteria for auto-merge but could not be automatically merged due to repository permissions.

          - Update type: ${{ steps.metadata.outputs.update-type }}
          - Dependencies: ${{ steps.metadata.outputs.dependency-names }}

          Please review and merge manually if appropriate."
          fi

      - name: Comment on Major Version Updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr comment "$PR_NUMBER" --body "**Major Version Update Detected**

          This PR contains a major version update that requires manual review:
          - **Dependency:** ${{ steps.metadata.outputs.dependency-names }}
          - **Previous version:** ${{ steps.metadata.outputs.previous-version }}
          - **New version:** ${{ steps.metadata.outputs.new-version }}

          Please review the changelog and breaking changes before merging.

          Auto-merge has been disabled for this PR."

      - name: Log Auto-Merge Decision
        run: |
          echo "Auto-merge decision for PR #${PR_NUMBER}:"
          echo "- Update type: ${{ steps.metadata.outputs.update-type }}"
          echo "- E2E result: ${{ steps.wait-e2e.outputs.e2e-result }}"
          echo "- Dependency: ${{ steps.metadata.outputs.dependency-names }}"
