# ci-status-jobs.yaml -- Single source of truth for ROSA CI daily status tracking.
#
# The ci-status-report.sh script reads this file to determine which Prow jobs
# to check and how to group them in the Slack summary. The rosa-eng-dashboard
# also fetches this file to build CI health views and component mappings.
#
# To add a new job: add an entry under the appropriate category.
# To add a new category: add a new top-level entry to the categories list.
#
# Each category has a scope that determines how its CI health maps to components:
#   component: Tests specific component(s). Must have a components list with
#              keys matching the hybrid-platforms/org component registry.
#   platform:  Tests the managed service platform as a whole. CI health from
#              platform tests contributes to every component's health indicator.
#   upstream:  Tests upstream OCP/HyperShift. Shown in exec summary only.

sippy_url: https://sippy.dptools.openshift.org/sippy-ng/release/rosa-stage

# Component-level Prow filter overrides for the CI health badge link.
# When a component has jobs from multiple categories, this specifies
# the Prow query URL shown when clicking the CI badge.
component_prow_filters:
  clusters-service: "https://prow.ci.openshift.org/?type=periodic&job=*ocm-fvt*staging*"

