# ci-status-jobs.yaml -- Single source of truth for ROSA CI daily status tracking.
#
# The ci-status-report.sh script reads this file to determine which Prow jobs
# to check and how to group them in the Slack summary.
#
# To add a new job: add an entry under the appropriate category.
# To add a new category: add a new top-level entry to the categories list.

sippy_url: https://sippy.dptools.openshift.org/sippy-ng/release/rosa-stage

categories:
  - id: rosa-e2e
    name: ROSA E2E
    prow_filter: "https://prow.ci.openshift.org/?type=periodic&job=*rosa-*e2e-nightly*"
    jobs:
      - name: HCP 4.19
        prow_job: periodic-ci-openshift-online-rosa-e2e-main-periodics-rosa-hcp-e2e-nightly-4-19
      - name: HCP 4.20
        prow_job: periodic-ci-openshift-online-rosa-e2e-main-periodics-rosa-hcp-e2e-nightly-4-20
      - name: HCP 4.21
        prow_job: periodic-ci-openshift-online-rosa-e2e-main-periodics-rosa-hcp-e2e-nightly-4-21
      - name: HCP 4.22
        prow_job: periodic-ci-openshift-online-rosa-e2e-main-periodics-rosa-hcp-e2e-nightly-4-22
      - name: HCP 5.0
        prow_job: periodic-ci-openshift-online-rosa-e2e-main-periodics-rosa-hcp-e2e-nightly-5-0
      - name: STS 4.19
        prow_job: periodic-ci-openshift-online-rosa-e2e-main-periodics-rosa-sts-e2e-nightly-4-19
      - name: STS 4.20
        prow_job: periodic-ci-openshift-online-rosa-e2e-main-periodics-rosa-sts-e2e-nightly-4-20
